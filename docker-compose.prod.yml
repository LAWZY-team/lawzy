services:
  mysql:
    image: mysql:8.0
    container_name: lawzy-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: lawzy
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - lawzy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lawzy-backend-prod
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/lawzy
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_REGION: ${R2_REGION}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - lawzy-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY}
        NEXT_PUBLIC_APP_URL: https://lawzy.vn
        NEXT_PUBLIC_BACKEND_URL: https://lawzy.vn/api
        BACKEND_URL: http://backend:5000
    container_name: lawzy-frontend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lawzy-prod.rule=Host(`lawzy.vn`) || Host(`www.lawzy.vn`)"
      - "traefik.http.routers.lawzy-prod.entrypoints=https"
      - "traefik.http.routers.lawzy-prod.tls=true"
      - "traefik.http.routers.lawzy-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.lawzy-prod.loadbalancer.server.port=3000"
    networks:
      - lawzy-network
      - coolify

networks:
  lawzy-network:
    driver: bridge
  coolify:
    external: true

volumes:
  mysql-data:
