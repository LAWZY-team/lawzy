# Default: MySQL cho development (giống docker/compose.dev.yml)
# Chạy: docker compose up -d
# Chi tiết các compose khác: xem docker/README.md
version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: lawzy-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: lawzy
    ports:
      - "3307:3306"
    volumes:
      - mysql-data-dev:/var/lib/mysql

volumes:
  mysql-data-dev:
