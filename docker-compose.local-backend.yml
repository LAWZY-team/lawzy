# Chạy từ thư mục gốc lawzy:
#   docker compose -f docker-compose.local-backend.yml up
#
# Giống docker/compose.local-backend.yml nhưng volume dùng đường dẫn ./backend
# (tiện khi không muốn nhớ -f docker/...).

services:
  lawzy-backend:
    build:
      context: .
      dockerfile: docker/local-backend.Dockerfile
    image: lawzy-backend-local:dev
    container_name: lawzy-backend-local
    working_dir: /app
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      PORT: "5000"
      FRONTEND_URL: "http://localhost:3000"
      NODE_ENV: "development"
      LEGAL_CRAWLER_TLS_STRICT: "true"
      NODE_EXTRA_CA_CERTS: "/app/tls/globalsign-rsa-ov-ssl-ca-2018.pem"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - lawzy_backend_node_modules:/app/node_modules
    command: >
      sh -c "npm ci && npx prisma generate && npm run start:dev"
    restart: unless-stopped
    # Giảm getaddrinfo EAI_AGAIN khi gọi R2 / API ngoài (DNS mặc định Docker Desktop đôi khi lỗi tạm thời)
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  lawzy_backend_node_modules:
