name: Deploy to Production

on:
  push:
    branches: [production]

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/lawzy-team/lawzy/frontend
  BACKEND_IMAGE: ghcr.io/lawzy-team/lawzy/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL || 'https://lawzy.vn' }}
            NEXT_PUBLIC_API_URL=http://backend:5000

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout for config files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.prod.yml
            nginx

      - name: Upload config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker-compose.prod.yml,nginx/"
          target: /opt/lawzy
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 20m
          script: |
            cd /opt/lawzy

            cat > .env <<EOF
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            NEXT_PUBLIC_APP_URL=https://lawzy.vn
            NEXT_PUBLIC_API_URL=http://backend:5000
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            R2_ENDPOINT_URL=${{ secrets.R2_ENDPOINT_URL }}
            R2_ACCESS_KEY=${{ secrets.R2_ACCESS_KEY }}
            R2_SECRET_KEY=${{ secrets.R2_SECRET_KEY }}
            R2_BUCKET=${{ secrets.R2_BUCKET }}
            R2_REGION=${{ secrets.R2_REGION }}
            EOF

            mkdir -p nginx/ssl/live/lawzy.vn
            if [ ! -f nginx/ssl/live/lawzy.vn/privkey.pem ]; then
              openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                -keyout nginx/ssl/live/lawzy.vn/privkey.pem \
                -out nginx/ssl/live/lawzy.vn/fullchain.pem \
                -subj '/CN=lawzy.vn/O=Lawzy/C=VN' 2>/dev/null
            fi

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cp docker-compose.prod.yml docker-compose.yml 2>/dev/null || true
            docker compose pull
            docker compose up -d
            docker image prune -f

            sleep 10
            STATUS=$(curl -sk -o /dev/null -w '%{http_code}' http://localhost:3000/)
            echo "Frontend status: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "WARNING: Frontend returned $STATUS"
              docker compose logs frontend --tail 30
            fi

            BACKEND_STATUS=$(curl -sk -o /dev/null -w '%{http_code}' http://localhost:5000/)
            echo "Backend status: $BACKEND_STATUS"

            echo "Deployment complete!"
