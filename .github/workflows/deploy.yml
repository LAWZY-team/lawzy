name: Deploy to Production

on:
  push:
    branches: [production]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          tar czf /tmp/lawzy-deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='coverage' \
            --exclude='dist' \
            --exclude='*.tsbuildinfo' \
            .

      - name: Stop and clean on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "Stopping containers..."
            cd /opt/lawzy && docker compose down 2>/dev/null || true
            echo "Cleaning source files..."
            rm -rf /opt/lawzy/frontend/src /opt/lawzy/backend/src

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "."
          target: /opt/lawzy
          overwrite: true
          rm: false
          strip_components: 0

      - name: Build and start on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 20m
          script: |
            cd /opt/lawzy

            cat > .env <<EOF
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            NEXT_PUBLIC_APP_URL=https://lawzy.vn
            EOF

            mkdir -p nginx/ssl/live/lawzy.vn
            if [ ! -f nginx/ssl/live/lawzy.vn/privkey.pem ]; then
              openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                -keyout nginx/ssl/live/lawzy.vn/privkey.pem \
                -out nginx/ssl/live/lawzy.vn/fullchain.pem \
                -subj '/CN=lawzy.vn/O=Lawzy/C=VN' 2>/dev/null
            fi

            docker compose up -d --build
            docker image prune -f

            sleep 5
            STATUS=$(curl -sk -o /dev/null -w '%{http_code}' http://localhost:3000/)
            echo "Frontend status: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "ERROR: Frontend is not responding!"
              docker compose logs frontend --tail 50
              exit 1
            fi
            echo "Deployment successful!"
