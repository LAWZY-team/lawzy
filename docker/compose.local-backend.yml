# Backend Lawzy chạy local trong Docker, kết nối MySQL qua DATABASE_URL trong backend/.env
# (có thể trỏ tới production — xem docker/README.md).
#
# Chạy từ thư mục gốc repo:
#   docker compose -f docker/compose.local-backend.yml up --build
#
# Frontend trên máy (yarn dev) cần: BACKEND_URL=http://localhost:5000 trong .env.local
#
services:
  lawzy-backend:
    build:
      context: ..
      dockerfile: docker/local-backend.Dockerfile
    image: lawzy-backend-local:dev
    container_name: lawzy-backend-local
    working_dir: /app
    ports:
      - "5000:5000"
    env_file:
      - ../backend/.env
    environment:
      PORT: "5000"
      FRONTEND_URL: "http://localhost:3000"
      NODE_ENV: "development"
      LEGAL_CRAWLER_TLS_STRICT: "true"
      # phapluat.gov.vn gửi thiếu intermediate — PEM GlobalSign trong backend/tls/ (bind mount /app)
      NODE_EXTRA_CA_CERTS: "/app/tls/globalsign-rsa-ov-ssl-ca-2018.pem"
      # Tránh IPv6 broken trên Docker Desktop (Windows) → fetch failed ngay lập tức
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      # Windows + bind mount: bật nếu nest --watch không reload
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ../backend:/app
      - lawzy_backend_node_modules:/app/node_modules
    command: >
      sh -c "npm ci && npx prisma generate && npm run start:dev"
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  lawzy_backend_node_modules:
