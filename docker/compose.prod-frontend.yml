# Production Frontend only (Coolify: VPS Frontend riêng)
# Coolify: base_directory: /, compose: docker/compose.prod-frontend.yml
# Env: BACKEND_URL=https://api.lawzy.vn, NEXT_PUBLIC_APP_URL=https://lawzy.vn,
#      NEXT_PUBLIC_SITE_ENV=production, NEXT_PUBLIC_ALLOW_ROBOT_INDEXING=true
services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://lawzy.vn}
        NEXT_PUBLIC_SITE_ENV: ${NEXT_PUBLIC_SITE_ENV:-production}
        NEXT_PUBLIC_ALLOW_ROBOT_INDEXING: ${NEXT_PUBLIC_ALLOW_ROBOT_INDEXING:-true}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        BACKEND_URL: ${BACKEND_URL}
    container_name: lawzy-frontend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lawzy-prod.rule=Host(`lawzy.vn`) || Host(`www.lawzy.vn`)"
      - "traefik.http.routers.lawzy-prod.entrypoints=https"
      - "traefik.http.routers.lawzy-prod.tls=true"
      - "traefik.http.routers.lawzy-prod.tls.certresolver=letsencrypt"
      - "traefik.http.services.lawzy-prod.loadbalancer.server.port=3000"
    networks:
      - coolify

networks:
  coolify:
    external: true
